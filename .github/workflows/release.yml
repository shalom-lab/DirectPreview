name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version from tag
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag '${TAG}'. Use semver tags like v1.2.3"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION} (from ${TAG})"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Sync package.json version
        run: node scripts/sync-version.mjs "${{ steps.meta.outputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Verify manifest version
        run: |
          node --input-type=module -e "
          import fs from 'node:fs';
          const expected = '${{ steps.meta.outputs.version }}';
          const manifest = JSON.parse(
            fs.readFileSync('build/chrome-mv3-prod/manifest.json', 'utf8')
          );
          if (manifest.version !== expected) {
            console.error(\`manifest.version=\${manifest.version}, expected=\${expected}\`);
            process.exit(1);
          }
          console.log('manifest.version OK:', manifest.version);
          "

      - name: Prepare release assets
        run: |
          mkdir -p dist/release
          cp build/chrome-mv3-prod.zip "dist/release/direct-preview-${{ steps.meta.outputs.version }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DirectPreview ${{ steps.meta.outputs.tag }}
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            build/chrome-mv3-prod.zip
            dist/release/direct-preview-${{ steps.meta.outputs.version }}.zip
          body: |
            ## DirectPreview ${{ steps.meta.outputs.tag }}

            | Item | Value |
            |------|-------|
            | Version | `${{ steps.meta.outputs.version }}` |
            | Manifest | synced from tag |

            ### Install (unpacked)

            1. Download `direct-preview-${{ steps.meta.outputs.version }}.zip`
            2. Unzip and load `chrome-mv3-prod` folder via `chrome://extensions` → **Load unpacked**

            ### Install (packed)

            Use `chrome-mv3-prod.zip` for store submission or distribution.
