name: Publish to Web Stores

on:
  push:
    tags:
      - "v*"
  # 手动触发：把某个已发布的 tag 版本推到商店（默认取最新 v* tag）
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(git describe --tags --abbrev=0 --match "v*")
          fi

          VERSION="${TAG#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag '${TAG}'. Use semver tags like v1.2.3"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG} → version: ${VERSION}"

      - name: Checkout tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "${{ steps.meta.outputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Sync package.json version
        run: node scripts/sync-version.mjs "${{ steps.meta.outputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Verify manifest version
        run: |
          node --input-type=module -e "
          import fs from 'node:fs';
          const expected = '${{ steps.meta.outputs.version }}';
          const manifest = JSON.parse(
            fs.readFileSync('build/chrome-mv3-prod/manifest.json', 'utf8')
          );
          if (manifest.version !== expected) {
            console.error(\`manifest.version=\${manifest.version}, expected=\${expected}\`);
            process.exit(1);
          }
          console.log('manifest.version OK:', manifest.version);
          "

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          if [ -z "$EXTENSION_ID" ] || [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || [ -z "$REFRESH_TOKEN" ]; then
            echo "::error::Missing Chrome Web Store secrets. Configure CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, and CHROME_REFRESH_TOKEN."
            exit 1
          fi

          npx --yes chrome-webstore-upload-cli@3 upload \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN" \
            --source "build/chrome-mv3-prod.zip"
            # --auto-publish
          # listing（Privacy / 图标 / 截图 / 描述 / Category）齐全后，去掉上一行注释即可自动发布
